[package]
name = "canopy-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "canopy"
path = "src/main.rs"

[dependencies]
canopy-core = { path = "../canopy-core" }
canopy-explore = { path = "../canopy-explore" }
canopy-storage = { path = "../canopy-storage" }
clap = { version = "4", features = ["derive"] }
dialoguer = "0.11"
anyhow = "1"
